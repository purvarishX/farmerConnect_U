<!-- NAVBAR -->
<div class="nav-bar-body">
    <nav class="navbar-warm-custom">
        <div class="navbar-container">
            <!-- Logo -->
            <a href="#" class="brand-warm-nav">
                Kisan<span>Bazaar</span>
            </a>

            <!-- Nav Links (Hidden on Mobile) -->
            <div class="nav-links-warm">
                <a href="#" class="nav-link-warm-item">Home</a>
                <a href="#" class="nav-link-warm-item">Shop</a>
                <a href="#" class="nav-link-warm-item">Our Farmers</a>
                <a class="nav-link-warm-item cursor-pointer" routerLink="/category">Categories</a>
                <a href="#" class="nav-link-warm-item">How It Works</a>
                <a href="#" class="nav-link-warm-item">About</a>
            </div>

            <!-- Right Section -->
            <div class="nav-right-warm">
                <!-- STATE: LOGGED IN (default visible) -->
                @if (loggedInUserData) {
                <div class="user-section-warm" id="loggedInSection">
                    <!-- User Info -->
                    <div class="user-info-warm">
                        <div class="user-avatar-warm" id="userAvatar">{{loggedInUserData.name.charAt(0) | uppercase}}
                        </div>
                        <div class="user-details-warm">
                            <div class="user-name-warm" id="userName">{{loggedInUserData.name}}</div>
                            <div class="user-email-warm" id="userEmail">{{loggedInUserData.email}}</div>
                        </div>
                    </div>

                    <!-- Cart Button -->
                    <button class="cart-btn-warm" title="Shopping cart" id="cartBtn">
                        🛒
                        <span class="cart-badge-warm" id="cartBadge">2</span>
                    </button>

                    <!-- Logout Button -->
                    <button class="logout-btn-warm" id="logoutBtn" (click)="logout()">
                        ← Logout
                    </button>
                </div>
                }

                <!-- STATE: LOGGED OUT (hidden by default) -->
                @else {
                <div class="auth-buttons-warm" id="loggedOutSection">
                    <button class="btn-nav-login-warm" (click)="navigateTo('login')">Login</button>
                    <button class="btn-nav-reg-warm" (click)="navigateTo('register')">Register</button>
                </div>
                }

            </div>
        </div>
    </nav>
</div>
